services:
  - type: web
    name: gym-management-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: USE_INMEMORY_DB
        value: "true"
      - key: ASPNETCORE_ENVIRONMENT
        value: "Production"

  - type: web
    name: gym-management-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://gym-management-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
